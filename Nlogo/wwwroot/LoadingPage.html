<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NLogo — Loading</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Space+Grotesk:wght@300;500;700&display=swap');

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0b1220;
            --bg2: #0f1a2e;
            --cyan: #38bdf8;
            --cyan-dim: #1e6a8a;
            --green: #22c55e;
            --green-dim: #14532d;
            --white: #f0f6ff;
            --muted: #4a6080;
            --trail: #38bdf8;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: var(--bg);
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
        }

        /* ── grid background ── */
        .grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: linear-gradient(rgba(56,189,248,.06) 1px, transparent 1px), linear-gradient(90deg, rgba(56,189,248,.06) 1px, transparent 1px);
            background-size: 40px 40px;
        }

            .grid::after {
                content: '';
                position: absolute;
                inset: 0;
                background: radial-gradient(ellipse 70% 70% at 50% 50%, transparent 30%, var(--bg) 100%);
            }

        /* ── glow orb ── */
        .orb {
            position: fixed;
            width: 500px;
            height: 500px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -60%);
            background: radial-gradient(circle, rgba(56,189,248,.12) 0%, rgba(34,197,94,.06) 40%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
            animation: orb-pulse 3s ease-in-out infinite;
        }

        @keyframes orb-pulse {
            0%, 100% {
                transform: translate(-50%, -60%) scale(1);
                opacity: 1;
            }

            50% {
                transform: translate(-50%, -60%) scale(1.15);
                opacity: .7;
            }
        }

        /* ── canvas ── */
        #trail-canvas {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        /* ── main card ── */
        .card {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
        }

        /* ── turtle SVG ── */
        .turtle-wrap {
            position: relative;
            width: 140px;
            height: 140px;
            animation: bob 2.8s ease-in-out infinite;
        }

        @keyframes bob {
            0%, 100% {
                transform: translateY(0px) rotate(-1deg);
            }

            50% {
                transform: translateY(-12px) rotate(1deg);
            }
        }

        .turtle-wrap svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 18px rgba(34,197,94,.6)) drop-shadow(0 0 40px rgba(34,197,94,.2));
        }

        /* shell shimmer */
        .shell-shine {
            animation: shimmer 2.8s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% {
                opacity: .6;
            }

            50% {
                opacity: 1;
            }
        }

        /* eye blink */
        .eye {
            transform-origin: center;
            animation: blink 4s ease-in-out infinite;
        }

        .eye-r {
            animation-delay: .15s;
        }

        @keyframes blink {
            0%, 90%, 100% {
                transform: scaleY(1);
            }

            95% {
                transform: scaleY(.1);
            }
        }

        /* ── brand ── */
        .brand {
            margin-top: 28px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -.02em;
            line-height: 1;
            opacity: 0;
            animation: fade-up .8s .3s forwards;
        }

            .brand .n {
                color: var(--cyan);
            }

            .brand .lo {
                color: var(--white);
            }

            .brand .go {
                color: var(--green);
            }

        .tagline {
            margin-top: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: .75rem;
            font-weight: 300;
            color: var(--muted);
            letter-spacing: .2em;
            text-transform: uppercase;
            opacity: 0;
            animation: fade-up .8s .55s forwards;
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(14px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── progress bar ── */
        .progress-wrap {
            margin-top: 44px;
            width: 260px;
            opacity: 0;
            animation: fade-up .8s .75s forwards;
        }

        .progress-track {
            height: 3px;
            background: rgba(56,189,248,.12);
            border-radius: 99px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--cyan), var(--green));
            border-radius: 99px;
            animation: fill-bar 2.4s .9s cubic-bezier(.4,0,.2,1) forwards;
            box-shadow: 0 0 8px var(--cyan);
        }

        @keyframes fill-bar {
            0% {
                width: 0%;
            }

            40% {
                width: 55%;
            }

            70% {
                width: 78%;
            }

            90% {
                width: 92%;
            }

            100% {
                width: 100%;
            }
        }

        .progress-dots {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }

            .progress-dots span {
                font-family: 'JetBrains Mono', monospace;
                font-size: .65rem;
                color: var(--muted);
                letter-spacing: .12em;
            }

            .progress-dots .pct {
                color: var(--cyan);
                animation: count-up 2.4s .9s steps(100, end) forwards;
            }

        @keyframes count-up {
            0% {
                content: '0%';
            }

            100% {
                content: '100%';
            }
        }
        /* JS will drive the percentage text */

        /* ── status line ── */
        .status {
            margin-top: 20px;
            height: 18px;
            font-family: 'JetBrains Mono', monospace;
            font-size: .7rem;
            color: var(--muted);
            letter-spacing: .1em;
            opacity: 0;
            animation: fade-up .6s 1.1s forwards;
        }

            .status .cursor {
                display: inline-block;
                width: 7px;
                height: 12px;
                background: var(--cyan);
                vertical-align: middle;
                margin-left: 3px;
                animation: blink-cursor .9s step-end infinite;
            }

        @keyframes blink-cursor {
            0%, 100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* ── corner decorations ── */
        .corner {
            position: fixed;
            width: 40px;
            height: 40px;
            z-index: 5;
            opacity: .35;
        }

            .corner svg {
                width: 100%;
                height: 100%;
            }

        .tl {
            top: 24px;
            left: 24px;
        }

        .tr {
            top: 24px;
            right: 24px;
            transform: scaleX(-1);
        }

        .bl {
            bottom: 24px;
            left: 24px;
            transform: scaleY(-1);
        }

        .br {
            bottom: 24px;
            right: 24px;
            transform: scale(-1);
        }

        /* ── version badge ── */
        .version {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'JetBrains Mono', monospace;
            font-size: .6rem;
            color: var(--muted);
            letter-spacing: .15em;
            z-index: 20;
        }
    </style>
</head>
<body>

    <div class="grid"></div>
    <div class="orb"></div>
    <canvas id="trail-canvas"></canvas>

    <!-- corner brackets -->
    <div class="corner tl">
        <svg viewBox="0 0 40 40" fill="none" stroke="#38bdf8" stroke-width="2">
            <path d="M2 22 L2 2 L22 2" />
        </svg>
    </div>
    <div class="corner tr">
        <svg viewBox="0 0 40 40" fill="none" stroke="#38bdf8" stroke-width="2">
            <path d="M2 22 L2 2 L22 2" />
        </svg>
    </div>
    <div class="corner bl">
        <svg viewBox="0 0 40 40" fill="none" stroke="#38bdf8" stroke-width="2">
            <path d="M2 22 L2 2 L22 2" />
        </svg>
    </div>
    <div class="corner br">
        <svg viewBox="0 0 40 40" fill="none" stroke="#38bdf8" stroke-width="2">
            <path d="M2 22 L2 2 L22 2" />
        </svg>
    </div>

    <div class="card">
        <!-- Turtle -->
        <div class="turtle-wrap">
            <svg viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- legs -->
                <ellipse cx="30" cy="72" rx="18" ry="11" fill="#16a34a" transform="rotate(-25 30 72)" />
                <ellipse cx="110" cy="72" rx="18" ry="11" fill="#16a34a" transform="rotate(25 110 72)" />
                <ellipse cx="34" cy="100" rx="15" ry="10" fill="#16a34a" transform="rotate(20 34 100)" />
                <ellipse cx="106" cy="100" rx="15" ry="10" fill="#16a34a" transform="rotate(-20 106 100)" />
                <!-- tail -->
                <ellipse cx="70" cy="118" rx="8" ry="14" fill="#16a34a" />
                <!-- shell base -->
                <ellipse cx="70" cy="82" rx="50" ry="38" fill="#15803d" />
                <!-- shell dome -->
                <ellipse cx="70" cy="78" rx="44" ry="33" fill="#22c55e" />
                <!-- shell shine -->
                <ellipse class="shell-shine" cx="70" cy="72" rx="30" ry="20" fill="#4ade80" opacity=".55" />
                <!-- hex pattern -->
                <circle cx="70" cy="68" r="11" fill="#16a34a" opacity=".8" />
                <circle cx="70" cy="68" r="6" fill="#10b981" opacity=".7" />
                <circle cx="50" cy="78" r="9" fill="#16a34a" opacity=".8" />
                <circle cx="50" cy="78" r="5" fill="#10b981" opacity=".7" />
                <circle cx="90" cy="78" r="9" fill="#16a34a" opacity=".8" />
                <circle cx="90" cy="78" r="5" fill="#10b981" opacity=".7" />
                <circle cx="60" cy="94" r="8" fill="#16a34a" opacity=".8" />
                <circle cx="60" cy="94" r="4" fill="#10b981" opacity=".7" />
                <circle cx="80" cy="94" r="8" fill="#16a34a" opacity=".8" />
                <circle cx="80" cy="94" r="4" fill="#10b981" opacity=".7" />
                <!-- shell edge highlight -->
                <ellipse cx="70" cy="78" rx="44" ry="33" fill="none" stroke="#4ade80" stroke-width="1.5" opacity=".4" />
                <!-- neck -->
                <rect x="60" y="42" width="20" height="22" rx="10" fill="#22c55e" />
                <!-- head -->
                <circle cx="70" cy="38" r="22" fill="#22c55e" />
                <circle cx="70" cy="35" r="16" fill="#4ade80" opacity=".6" />
                <!-- eyes -->
                <g class="eye">
                    <circle cx="62" cy="32" r="7" fill="white" />
                    <circle cx="63" cy="33" r="4" fill="#0b1220" />
                    <circle cx="62" cy="31" r="1.5" fill="white" opacity=".9" />
                </g>
                <g class="eye eye-r">
                    <circle cx="78" cy="32" r="7" fill="white" />
                    <circle cx="79" cy="33" r="4" fill="#0b1220" />
                    <circle cx="78" cy="31" r="1.5" fill="white" opacity=".9" />
                </g>
                <!-- smile -->
                <path d="M65 44 Q70 47 75 44" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" fill="none" />
            </svg>
        </div>

        <!-- Brand name -->
        <div class="brand">
            <span class="n">N</span><span class="lo">Lo</span><span class="go">go</span>
        </div>

        <div class="tagline">Logo Language IDE · .NET 10 MAUI</div>

        <!-- Progress -->
        <div class="progress-wrap">
            <div class="progress-track">
                <div class="progress-fill"></div>
            </div>
            <div class="progress-dots">
                <span id="status-msg">Initialising…</span>
                <span class="pct" id="pct-text">0%</span>
            </div>
        </div>

        <!-- Typing status -->
        <div class="status" id="status-line">
            <span id="typed-text"></span><span class="cursor"></span>
        </div>
    </div>

    <div class="version">v1.0.0 &nbsp;·&nbsp; .NET 10 &nbsp;·&nbsp; MAUI Blazor Hybrid</div>

    <script>
    // ── Trail canvas animation ──────────────────────────────────────────────
    const canvas = document.getElementById('trail-canvas');
    const ctx    = canvas.getContext('2d');
    let   W, H;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const TRAIL_POINTS = 80;
    const trail = [];
    let   tAngle = 0;
    let   tx = -1, ty = -1;   // turtle position (lazy init)
    let   tStep  = 0;

    function initTrail() {
      tx = W * .5;
      ty = H * .5 - 60;
      for (let i = 0; i < TRAIL_POINTS; i++) trail.push({ x: tx, y: ty, a: 0 });
    }

    function stepTurtle() {
      if (tx < 0) initTrail();
      // Draw a slowly evolving spiral / squarish path
      tStep += .012;
      tAngle += .025 + Math.sin(tStep * .3) * .015;

      const speed = 1.2 + Math.sin(tStep) * .4;
      tx += Math.cos(tAngle) * speed;
      ty += Math.sin(tAngle) * speed;

      // Bounce inside a circle so it stays near centre
      const dx = tx - W * .5, dy = ty - H * .5 - 60;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 160) {
        tAngle += Math.PI * .35;
      }

      trail.push({ x: tx, y: ty });
      if (trail.length > TRAIL_POINTS) trail.shift();
    }

    function drawTrail() {
      ctx.clearRect(0, 0, W, H);
      if (trail.length < 2) return;

      for (let i = 1; i < trail.length; i++) {
        const t   = i / trail.length;
        const a   = t * .55;
        const w   = t * 2.5;
        const p   = trail[i - 1], q = trail[i];

        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(q.x, q.y);
        ctx.strokeStyle = `rgba(56,189,248,${a})`;
        ctx.lineWidth   = w;
        ctx.lineCap     = 'round';
        ctx.stroke();
      }

      // Dot at head
      const head = trail[trail.length - 1];
      ctx.beginPath();
      ctx.arc(head.x, head.y, 4, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(56,189,248,.8)';
      ctx.fill();
    }

    function loop() {
      stepTurtle();
      drawTrail();
      requestAnimationFrame(loop);
    }
    loop();

    // ── Percentage counter ──────────────────────────────────────────────────
    const pctEl = document.getElementById('pct-text');
    const msgEl = document.getElementById('status-msg');
    const msgs  = [
      { at:  0, text: 'Initialising…' },
      { at: 20, text: 'Loading compiler…' },
      { at: 45, text: 'Parsing runtime…' },
      { at: 65, text: 'Preparing canvas…' },
      { at: 85, text: 'Starting IDE…' },
      { at: 99, text: 'Ready!' },
    ];
    let pct = 0;
    const startTime = Date.now();
    const DURATION  = 3300; // ms — match CSS animation

    function updateProgress() {
      const elapsed = Date.now() - startTime;
      const raw     = Math.min(elapsed / DURATION, 1);
      // ease-in-out cubic
      const t = raw < .5 ? 4 * raw * raw * raw
                          : 1 - Math.pow(-2 * raw + 2, 3) / 2;
      pct = Math.floor(t * 100);
      pctEl.textContent = pct + '%';

      for (let i = msgs.length - 1; i >= 0; i--) {
        if (pct >= msgs[i].at) { msgEl.textContent = msgs[i].text; break; }
      }
      if (raw < 1) requestAnimationFrame(updateProgress);
    }
    requestAnimationFrame(updateProgress);

    // ── Typewriter ──────────────────────────────────────────────────────────
    const lines = [
      'TO draw.spiral :n',
      '  REPEAT :n [ FD :n RT 91 ]',
      'END',
      '',
      'draw.spiral 200',
    ];
    const typedEl = document.getElementById('typed-text');
    let   lineIdx = 0, charIdx = 0;
    let   fullText = '';

    function typeNext() {
      if (lineIdx >= lines.length) return;
      const line = lines[lineIdx];
      if (charIdx <= line.length) {
        typedEl.textContent = fullText + line.slice(0, charIdx);
        charIdx++;
        setTimeout(typeNext, 38 + Math.random() * 30);
      } else {
        fullText += line + '\n';
        lineIdx++; charIdx = 0;
        setTimeout(typeNext, line === '' ? 80 : 260);
      }
    }
    setTimeout(typeNext, 1200);
    </script>
</body>
</html>
